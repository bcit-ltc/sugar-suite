name: Run Semantic Release
description: A reusable action to run semantic release with optional debug arguments.

inputs:
  enable_pipeline_debug:
    description: Enable pipeline debug mode (true/false)
    required: false
    default: "false"
  github_token:
    description: GitHub token for authentication
    required: true
  dagger_cloud_token:
    description: Dagger Cloud token for authentication
    required: true

outputs:
  result:
    description: The result of the semantic release command

runs:
  using: "docker"
  image: "ghcr.io/dagger/dagger-for-github:8.0.0"
  env:
    GITHUB_TOKEN: ${{ inputs.github_token }}
    DAGGER_CLOUD_TOKEN: ${{ inputs.dagger_cloud_token }}
  entrypoint: "/bin/sh -c"
  args:
    - |
      echo "Setting Debug Args..." && \
      if [ "${{ inputs.enable_pipeline_debug }}" = "true" ]; then \
        DEBUG_ARGS="--pipeline_debug=true"; \
      else \
        DEBUG_ARGS=""; \
      fi && \
      echo "Running Semantic Release..." && \
      if ! command -v semantic-release >/dev/null 2>&1; then \
        echo "Error: semantic-release is not installed in the container." && exit 1; \
      fi && \
      semantic-release \
        --token=env://GITHUB_TOKEN \
        --project_url=${{ github.server_url }}/${{ github.repository }} \
        $DEBUG_ARGS && \
      echo "::set-output name=result::Semantic Release completed successfully."