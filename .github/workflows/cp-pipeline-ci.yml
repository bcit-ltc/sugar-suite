name: Course Production Pipeline CI

on:
  push:
    branches:
      - main
      - '([0-9]+)-(.*)' # branches with version numbers
      - '*' # for testing

env:
  # PIPELINE_DEBUG: ${{ '--pipeline_debug=true' }} # uncomment to enable debug mode

jobs:
  run-dagger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      # - name: Set up SSH
      #   run: |
      #     eval "$(ssh-agent -s)"
      #     ssh-add - <<< '${{ secrets.SSH_PRIVATE_KEY }}'
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Dagger
        uses: dagger/dagger-for-github@8.0.0
        with:
          version: "latest"
          args: semanticrelease --token=env://GITHUB_TOKEN --project_url=${{ github.server_url }}/${{ github.repository }} ${{ env.PIPELINE_DEBUG || '' }}
          # assumes the Dagger Cloud token is in a repository secret 
          # named DAGGER_CLOUD_TOKEN set via the GitHub UI/CLI
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        env:
          # PACKAGE_REGISTRY: ghcr.io
          # PACKAGE_IMAGE_NAME: ${{ github.repository }}
          # REGISTRY_USERNAME: ${{ github.actor }}
          # assumes the container registry password is in a repository secret
          # named REGISTRY_PASSWORD set via the GitHub UI/CL
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # - name: Print latest version
      #   run: echo "The latest tag is $(cat NEXT_VERSION)"
