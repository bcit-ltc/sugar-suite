name: Course Production Pipeline CI

on:
  push:
    branches:
      - main
      - '[0-9]+-*'
permissions:
  contents: read # for checkout
  packages: write # Required for pulling images

jobs:
  semantic-release:
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      packages: write # Required for pushing images
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Dagger semantic release
        uses: dagger/dagger-for-github@8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          args: semanticrelease --token=env://GITHUB_TOKEN

      - name: Set the version
        id: set-next-version
        run: |
          echo VERSION_NUM=$(cat NEXT_VERSION) >> $GITHUB_OUTPUT
      - name: verify the version
        run: |
          if [ -z "${{ steps.set-next-version.outputs.VERSION_NUM }}" ]; then
            echo "No version found, cancelling job."
            exit 0
          else
            echo "Version found: ${{ steps.set-next-version.outputs.VERSION_NUM }}"     
          fi

  previous-version:
    name: Previous Version
    needs: [semantic-release]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-chosen-version.outputs.CHOSEN_VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all tags
        run: git fetch --tags

      - name: Get latest tag
        run: |
          TAG=$(git describe --tags `git rev-list --tags --max-count=1` 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            TAG="1.0.0"
          fi
          echo "$TAG" > TAG

      - name: Print latest tag
        run: echo "The latest tag is $(cat TAG)"

      - name: If next version is empty choose latest tag
        id: get-chosen-version
        run: |
          if [ -z "${{ needs.semantic-release.outputs.version }}" ]; then
            echo "CHOSEN_VERSION=$(cat TAG)" >> $GITHUB_OUTPUT
          else
            echo "CHOSEN_VERSION=${{ needs.semantic-release.outputs.version }}" >> $GITHUB_OUTPUT
          fi
          
  ## This is the step that determines the environment
  ## conditionally chooses latest, stable or review based on branch and commit
  determine-environment:
    name: Determine Environment
    needs: [semantic-release, previous-version]
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-environment.outputs.ENVIRONMENT }}
    steps:
      - uses: actions/checkout@v4
      - name: Get commit message
        id: get-commit-message
        run: echo "COMMIT_MESSAGE=$(git log -1 --pretty=%B | tr -d '\n' | sed 's/"/\\"/g')" >> $GITHUB_ENV
      - name: Set the environment
        id: set-environment
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            if [[ "${{ env.COMMIT_MESSAGE }}" =~ ^(fix\s*:\s*|feat\s*:\s*|major\s*:\s*) ]]; then
              ENV_NAME="stable"
            else
              ENV_NAME="latest"
            fi
          elif [[ "${{ github.ref_name }}" =~ ^[0-9]+-.*$ ]]; then
            ENV_NAME="review"
          fi
          echo ENVIRONMENT=$ENV_NAME >> $GITHUB_OUTPUT

      - name: print the environment
        run: echo "The environment is ${{ steps.set-environment.outputs.ENVIRONMENT }}"

  build-for-environment:
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      packages: write # Required for pulling images
    name: Build for environment
    needs: [previous-version, determine-environment]
    if: ${{ needs.determine-environment.outputs.environment != '' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Print build environment
        run: echo "This is the ${{ needs.determine-environment.outputs.environment }} environment"
      - name: Print gathered version
        run: echo "The version is ${{ needs.previous-version.outputs.version }}"
      
      - name: Create Tag
        run: |
          SHORT_COMMIT=$(git rev-parse --short HEAD)
          CURRENT_DATE=$(date +'%Y-%m-%d')
          CURRENT_TIMESTAMP=$(date +'%s')
          SHORT_VERSION_TAG="${{ needs.previous-version.outputs.version }}"
          LONG_VERSION_TAG="$SHORT_VERSION_TAG-$CURRENT_DATE--$SHORT_COMMIT.$CURRENT_TIMESTAMP"
          ENVIRONMENT="${{ needs.determine-environment.outputs.environment }}"
      
          # Determine tags based on the environment
          if [ "$ENVIRONMENT" == "review" ]; then
            TAGS="review--${{ github.ref_name }}--$SHORT_COMMIT"
          elif [ "$ENVIRONMENT" == "latest" ]; then
            TAGS="$LONG_VERSION_TAG,latest"
          elif [ "$ENVIRONMENT" == "stable" ]; then
            TAGS="$SHORT_VERSION_TAG,$LONG_VERSION_TAG,latest,stable"
          fi
      
          # Export tags to GitHub environment
          echo "TAGS=$TAGS" >> $GITHUB_ENV
          echo "$TAGS"
      
      - name: Build and push Docker image using Dagger
        uses: dagger/dagger-for-github@8.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          args: publish --registry=ghcr.io/bcit-ltc/${{ github.event.repository.name }} --username=${{ github.actor }} --token=env://GITHUB_TOKEN --tags=$TAGS