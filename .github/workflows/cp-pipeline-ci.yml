name: Course Production Pipeline CI

on:
  push:
    branches:
      - main
      - '([0-9]+)-(.*)' # branches with version numbers
      - '*' # for testing

jobs:
  run-dagger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      ENABLE_PIPELINE_DEBUG: true # Set to true to enable pipeline debug mode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semantic Release
        uses: ./.github/actions/run-semantic-release
        with:
          enable_pipeline_debug: ${{ env.ENABLE_PIPELINE_DEBUG }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dagger_cloud_token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          github_server_url: ${{ github.server_url }}
          github_repository: ${{ github.repository }}
