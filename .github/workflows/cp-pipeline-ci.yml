name: Course Production Pipeline CI

on:
  push:
    branches:
      - main
      - '([0-9]+)-(.*)' # branches with version numbers
      - '*' # for testing

jobs:
  run-dagger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      ENABLE_PIPELINE_DEBUG: true # Set to true to enable pipeline debug mode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Debug Args
        run: |
          if [ "${{ env.ENABLE_PIPELINE_DEBUG }}" = "true" ]; then
            echo "DEBUG_ARGS=--pipeline_debug=true" >> $GITHUB_ENV
          else
            echo "DEBUG_ARGS=" >> $GITHUB_ENV
          fi

      - name: Run Semantic Release
        uses: ./.github/actions/run-semantic-release
        with:
          debug_args: ${{ env.DEBUG_ARGS }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dagger_cloud_token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
