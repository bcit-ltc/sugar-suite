apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      serviceAccountName: sugar-suite-serviceaccount
      containers:
        - name: sugar-suite
          envFrom:
            - configMapRef:
                name: elasticapm-config
