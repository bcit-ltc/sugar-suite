apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
commonLabels:
  environment: latest
# Prefix/Suffix required for VaultAuth configuration
#
namePrefix: sugar-suite-
nameSuffix: -latest
# Facilitate kustomization name updating
#
configurations:
  - kustomizeconfig.yaml
commonAnnotations:
  version: 1.2.2-7f322773--2024-09-19.1726763180 # {"$imagepolicy": "sugar-suite:sugar-suite-image-policy-latest:tag"}
images:
  - name: "sugar-suite"
    newName: "registry.ltc.bcit.ca/web-apps/sugar-suite"
    newTag: "1.2.2-7f322773--2024-09-19.1726763180" # {"$imagepolicy": "sugar-suite:sugar-suite-image-policy-latest:tag"}
patches:
  # Patches ingress to add "latest--" prefix to ingress URL
  #
  - target:
      kind: Ingress
    path: ingress-patch.yaml
  # Incorporate vault-secrets
  #
  # adds `-latest` suffix to VaultAuth `spec.mount`
  - target:
      kind: VaultAuth
    path: vault-secrets-latest/vault-auth-patch.yaml
components:
  # Include environment-specific secrets
  - ./vault-secrets-latest
  # Required for VaultAuth role and serviceaccounts
  - ../../base/components/vault-auth
