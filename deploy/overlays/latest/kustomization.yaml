apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sugar-suite
resources:
  - ../../base
commonLabels:
  environment: latest
commonAnnotations:
  version: 1.1.7-a999ec75--2023-09-22.1695419898 # {"$imagepolicy": "sugar-suite:sugar-suite-image-policy:tag"}
images:
  - name: "sugar-suite"
    newName: "registry.ltc.bcit.ca/web-apps/sugar-suite"
    newTag: "1.1.7-a999ec75--2023-09-22.1695419898" # {"$imagepolicy": "sugar-suite:sugar-suite-image-policy:tag"}
# Generates elasticapm config
#
configMapGenerator:
  - name: elasticapm-config
    literals:
      - ELASTIC_APM_SERVICE_NAME=sugar-suite-latest
      - ELASTIC_APM_SERVER_URL=https://bcit-ltc.apm.westus2.azure.elastic-cloud.com
patches:
  # Patches ingress to add "latest--" prefix to ingress URL
  #
  - target:
      kind: Ingress
    path: ingress-patch.yaml
  # Adds elasticapm config to deployment
  #
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value: [{"configMapRef": {"name":"elasticapm-config"}}]
