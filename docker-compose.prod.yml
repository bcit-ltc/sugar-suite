name: ${APP_NAME:-sugar-suite}

# Builds and runs the final production image (nginx serving /dist) locally.
# Usage:
#   docker compose -f docker-compose.prod.yml up --build
#   open http://localhost:8080

services:
  app:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64

    environment:
      - NODE_ENV=production

    ports:
      - "8080:8080"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
